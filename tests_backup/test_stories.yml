version: "3.1"

stories:
- story: test greet
  steps:
    - user: |
        hello
      intent: greet
    - action: utter_greet

- story: test fever help
  steps:
    - user: |
        I have a fever
      intent: ask_fever_help
    - action: utter_fever_help

- story: test malaria info
  steps:
    - user: |
        what are the symptoms of malaria
      intent: ask_malaria_info
    - action: utter_malaria_info

- story: test emergency
  steps:
    - user: |
        I have chest pain
      intent: emergency_help
    - action: utter_emergency_help

- story: test goodbye
  steps:
    - user: |
        bye
      intent: goodbye
    - action: utter_goodbye

